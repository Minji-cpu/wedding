<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Noto+Serif+KR&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">
        <section class="hero">
            <h1>J & M</h1>
            <p class="subtitle">Wedding Invitation</p>
        </section>
        <section class="main">
            <p class="message">
                서로 다른 길을 걸어온 두 사람이<br>
                이제 하나의 길을 함께 걸어가려 합니다.<br><br>
                소중한 분들을 모시고<br>
                새로운 시작을 함께하고자 합니다.
            </p>
        </section>
        <section class="info">
            <h2>💍 Wedding Day</h2>
            <p>2026년 5월 10일 일요일 오후 2시</p>

            <h2>📍 Location</h2>
            <p>서울특별시 영등포구 의사당대로 1<br>국회의사당 소통관</p>
        </section>
        <section class="gallery">
            <img src="https://via.placeholder.com/500x300" alt="웨딩 사진">
        </section>
        <section class="map">
            <h2>📌 오시는 길</h2>

            <iframe 
                src="https://maps.google.com/maps?q=국회의사당%20소통관&t=&z=15&ie=UTF8&iwloc=&output=embed"
                width="100%" 
                height="300" 
                style="border:0;"
                allowfullscreen="" 
                loading="lazy">
            </iframe>

        </section>
        <footer>
            <p>귀한 걸음 하시어 자리를 빛내주시면 감사하겠습니다</p>
        </footer>

    </div>

</body>
</html>
