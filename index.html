<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결혼식 청첩장</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background-color: #e8f5e8;
            padding: 40px 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5em;
            margin: 0;
            color: #2e7d32;
        }
        .header p {
            font-size: 1.2em;
            margin: 10px 0 0 0;
            color: #388e3c;
        }
        .content {
            padding: 30px 20px;
            text-align: center;
        }
        .date-place {
            margin-bottom: 30px;
        }
        .date-place h2 {
            font-size: 1.8em;
            margin: 0 0 10px 0;
            color: #2e7d32;
        }
        .date-place p {
            font-size: 1.1em;
            margin: 5px 0;
        }
        .images {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .images img {
            width: 45%;
            max-width: 200px;
            height: auto;
            border-radius: 10px;
            margin: 10px;
        }
        .map {
            margin-top: 30px;
        }
        .map h2 {
            font-size: 1.8em;
            margin-bottom: 20px;
            color: #2e7d32;
        }
        .map iframe {
            width: 100%;
            height: 300px;
            border: none;
            border-radius: 10px;
        }
        @media (max-width: 480px) {
            .header h1 {
                font-size: 2em;
            }
            .header p {
                font-size: 1em;
            }
            .date-place h2 {
                font-size: 1.5em;
            }
            .images img {
                width: 100%;
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>김철수 & 이영희</h1>
            <p>결혼합니다</p>
        </div>
        <div class="content">
            <div class="date-place">
                <h2>2026년 4월 1일</h2>
                <p>오후 4시</p>
                <p>서울특별시 강남구 역삼동</p>
                <p>강남 웨딩홀</p>
            </div>
            <div class="images">
                <img src="https://via.placeholder.com/200x150/2e7d32/ffffff?text=신랑" alt="신랑 사진">
                <img src="https://via.placeholder.com/200x150/388e3c/ffffff?text=신부" alt="신부 사진">
            </div>
            <div class="map">
                <h2>오시는 길</h2>
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3162.914!2d126.978!3d37.5665!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x357ca2c74ae9c9b1%3A0x8b6c5c2b9c7c7c7c!2sGangnam%20Station!5e0!3m2!1sko!2skr!4v1700000000000!5m2!1sko!2skr" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>
    </div>
</body>
</html>
